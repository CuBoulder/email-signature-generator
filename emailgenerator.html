<!-- Email Generator DO NOT REMOVE-->
<!-- Form -->
<div class="container my-4 siggen">
  <h2>Email Signature Generator</h2>
  <div class="row g-3">

    <div class="col-md-6">
      <label class="form-label">First Name</label>
      <input class="form-control" id="sig_first">
    </div>

    <div class="col-md-6">
      <label class="form-label">Last Name</label>
      <input class="form-control" id="sig_last">
    </div>

    <div class="col-md-6">
      <label class="form-label">Job Title</label>
      <input class="form-control" id="sig_job">
    </div>

    <div class="col-md-6">
      <label class="form-label">Department</label>
      <input class="form-control" id="sig_dept">
    </div>

    <div class="col-md-6">
      <label class="form-label">Additional Title</label>
      <input class="form-control" id="sig_addtitle">
    </div>

    <div class="col-md-6">
      <label class="form-label">Email</label>
      <input class="form-control" id="sig_email">
    </div>

    <div class="col-md-6">
      <label class="form-label">Room / Building</label>
      <input class="form-control" id="sig_addr1">
    </div>

    <div class="col-md-6">
      <label class="form-label">City / State / Zip</label>
      <input class="form-control" id="sig_addr2">
    </div>

    <div class="col-md-4">
      <label class="form-label">Main Office</label>
      <input class="form-control" id="sig_main">
    </div>

    <div class="col-md-4">
      <label class="form-label">Direct</label>
      <input class="form-control" id="sig_direct">
    </div>

    <div class="col-md-4">
      <label class="form-label">Mobile</label>
      <input class="form-control" id="sig_mobile">
    </div>

    <div class="col-md-6">
      <label class="form-label">Fax</label>
      <input class="form-control" id="sig_fax">
    </div>

    <div class="col-md-6">
      <label class="form-label">Pronouns</label>
      <input class="form-control" id="sig_pronouns">
    </div>

    <div class="col-md-6">
      <label class="form-label">Signature Style</label>
      <select class="form-control" id="sig_style">
        <option value="logo1">Logo Only</option>
        <option value="logo150">150 with Logo</option>
        <option value="none">None</option>
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label">Website</label>
      <input class="form-control" id="sig_webpath" placeholder="https://www.colorado.edu">
    </div>

  </div>
  <div class="mt-4 d-flex align-items-center gap-2 mb-2 flex-wrap">
    <button class="ucb-link-button ucb-link-button-blue ucb-link-button-regular ucb-link-button-default"
            id="sig_generate" type="button">Generate</button>
  </div>

  <hr>

  <label class="form-label">Signature</label>

  <div id="sig_preview_wrap">
    <div id="sig_preview">&nbsp;</div>
  </div>

  <p style="margin-top:8px;">
    Click once anywhere on the text in the box below (avoid the linked text or image) to select all text inside the box.
  </p>

</div>
<!-- Page Style DO NOT REMOVE -->
<style>
/* Fake box look */
#sig_preview_wrap {
  position: relative;
  padding: 12px;
}

/* Using a pseudoelement so it doesn't get copied w/ the signature */
#sig_preview_wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  border: 1px solid #ddd;
  border-radius: 6px;
  background: #f8f9fa;
  z-index: 0;
}

#sig_preview {
  position: relative;
  z-index: 1;
  background: transparent;
}
</style>

<!-- JavaScript DO NOT REMOVE-->
<script src="https://cdn.jsdelivr.net/gh/CuBoulder/email-signature-generator@main/emailgenerator.js"></script>
<!-- END EMAIL GENERATOR -->
